<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Paraula Ràpida</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B5BFF">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header class="app-header">
      <h1>Paraula Ràpida</h1>
      <div class="header-controls">
        <span id="nivell-actual">Nivell 1 - B1</span>
        <select id="idioma-select">
          <option value="ca-es">Català</option>
          <option value="es-es">Español</option>
          <option value="en-us">English</option>
        </select>
      </div>
    </header>

    <!-- STATS BAR -->
    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-label">Rècord</span>
        <span class="stat-value" id="record">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Monedes</span>
        <span class="stat-value" id="monedes">20</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">XP</span>
        <span class="stat-value" id="xp">0</span>
      </div>
    </div>

    <!-- CONTENIDO TABS -->
    <main class="tab-content-container">
      
      <!-- TAB MAPA -->
      <section id="tab-mapa" class="tab-content active">
        <h2>Mapa de 100 Nivells</h2>
        <div id="mapa-nivells" class="mapa-grid"></div>
      </section>

      <!-- TAB JUGAR -->
      <section id="tab-missio" class="tab-content">
        <div id="minijoc-container"></div>
      </section>

      <!-- TAB GREMI -->
      <section id="tab-gremi" class="tab-content">
        <div id="gremi-contenidor"></div>
      </section>

      <!-- TAB BOTIGA -->
      <section id="tab-botiga" class="tab-content">
        <h2>Botiga de Packs</h2>
        <div id="botiga-contenidor"></div>
      </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="mostrarTab('mapa')">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Mapa</span>
      </button>
      <button class="nav-item" onclick="mostrarTab('missio')">
        <span class="nav-icon">🎮</span>
        <span class="nav-label">Jugar</span>
      </button>
      <button class="nav-item" onclick="mostrarTab('gremi')">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Gremi</span>
      </button>
      <button class="nav-item" onclick="mostrarTab('botiga')">
        <span class="nav-icon">🛒</span>
        <span class="nav-label">Botiga</span>
      </button>
    </nav>
  </div>

  <!-- ORDRE DE CÀRREGA IMPORTANT -->
  <script src="./emoji-data.js"></script>
  <script src="./frases-data.js"></script>
  <script src="./tips-data.js"></script>
  <script src="./botiga-data.js"></script>
  <script src="./lectura-content.js"></script>
  <script src="./main.js"></script>

  <!-- SW REGISTER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
