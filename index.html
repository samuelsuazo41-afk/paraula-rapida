<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paraula Ràpida</title>
<meta name="description" content="Joc per aprendre català B1-B3 en 100 nivells">
<meta name="theme-color" content="#FF6B35">

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Icones -->
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header id="app-header">
  <h1 id="app-titol">Paraula Ràpida</h1>
  <div id="nivell-actual">Nivell 1 - B1</div>
  <select id="idioma-select">
    <option value="ca-es">Català → Espanyol</option>
    <option value="ca-en">Català → English</option>
    <option value="es-ca">Espanyol → Català</option>
    <option value="en-ca">English → Català</option>
  </select>
</header>

<div class="stats-bar">
  <div class="stat-item">🏆 Rècord: <span id="record">0</span></div>
  <div class="stat-item">Monedes: <span id="monedes">0</span> | XP: <span id="xp">0</span></div>
</div>

<div class="container">

  <!-- Tab Mapa -->
  <div id="tab-mapa" class="tab-content active">
    <h2 style="margin-bottom: 20px;">🗺️ 100 Nivells</h2>
    <div id="mapa-nivells"></div>
  </div>

  <!-- Tab Missio -->
  <div id="tab-missio" class="tab-content">
    <div id="minijoc-container"></div>
  </div>

  <!-- Tab Gremi -->
  <div id="tab-gremi" class="tab-content">
    <div id="gremi-contenidor"></div>
  </div>

  <!-- Tab Botiga -->
  <div id="tab-botiga" class="tab-content">
    <div id="botiga-contenidor"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item active" onclick="mostrarTab('mapa')">
    <span class="nav-icon">🗺️</span>
    Mapa
  </div>
  <div class="nav-item" onclick="mostrarTab('missio')">
    <span class="nav-icon">🎯</span>
    Jugar
  </div>
  <div class="nav-item" onclick="mostrarTab('gremi')">
    <span class="nav-icon">🏛️</span>
    Gremi
  </div>
  <div class="nav-item" onclick="mostrarTab('botiga')">
    <span class="nav-icon">🛒</span>
    Botiga
  </div>
</nav>

<script>
// Registrar Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrat:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>

<!-- ORDRE CRÍTIC: dades abans que lògica -->
<script src="./emoji-data.js"></script>
<script src="./frases-data.js"></script>
<script src="./tips-data.js"></script>
<script src="./botiga-data.js"></script>
<script src="./lectura-generator.js"></script>
<script src="./main.js"></script>

</body>
</html>
