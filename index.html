<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Paraula Ràpida</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6B5BFF">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header class="app-header">
      <h1 id="app-titol">Paraula Ràpida</h1>
      <div class="header-controls">
        <div id="coins" class="coins-display">🪙 50 <span id="text-monedes">Monedes</span></div>
        <select id="idioma-select" onchange="canviarIdioma(this.value)">
          <option value="ca">Català</option>
          <option value="es">Español</option>
          <option value="en">English</option>
        </select>
      </div>
    </header>

    <!-- CONTENIDO TABS -->
    <main class="tab-content-container">
      
      <!-- TAB MAPA -->
      <section id="tab-mapa" class="tab-content active">
        <h2>Mapa de 100 Nivells</h2>
        <div id="mapa-nivells" class="mapa-grid"></div>
      </section>

      <!-- TAB MISSIO/JUGAR -->
      <section id="tab-missio" class="tab-content">
        <div id="minijoc-container"></div>
      </section>

      <!-- TAB GREMI -->
      <section id="tab-gremi" class="tab-content">
        <!-- Subtabs para Gremi -->
        <div class="sub-tabs" id="biblioteca-subtabs" style="display:none;">
          <button class="sub-tab-btn active" onclick="mostrarBibliotecaTab('diccionari', event)">Diccionari</button>
          <button class="sub-tab-btn" onclick="mostrarBibliotecaTab('tips', event)">Tips</button>
        </div>
        <div id="gremi-contenidor" class="gremi-grid"></div>
      </section>

      <!-- TAB BOTIGA -->
      <section id="tab-botiga" class="tab-content">
        <h2>Botiga de Packs</h2>
        <div id="botiga-contenidor" class="botiga-grid"></div>
      </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="canviarTab('mapa', event)">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label" id="tab-mapa-txt">Mapa</span>
      </button>
      <button class="nav-item" onclick="canviarTab('gremi', event)">
        <span class="nav-icon">📚</span>
        <span class="nav-label" id="tab-gremi-txt">Gremi</span>
      </button>
      <button class="nav-item" onclick="canviarTab('botiga', event)">
        <span class="nav-icon">🛒</span>
        <span class="nav-label" id="tab-botiga-txt">Botiga</span>
      </button>
    </nav>
  </div>

  <!-- ORDRE DE CÀRREGA CRÍTIC -->
  <script src="./emoji-data.js"></script>
  <script src="./frases-data.js"></script>
  <script src="./tips-data.js"></script>
  <script src="./botiga-data.js"></script>
  <script src="./lectura-content.js"></script>
  <script src="./main.js"></script>

  <!-- SW REGISTER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
</body>
</html>
