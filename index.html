<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paraula Ràpida</title>
<meta name="description" content="Joc per aprendre català B1-B3 en 100 nivells">
<meta name="theme-color" content="#FF6B35">

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Icones -->
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header id="app-header">
  <h1 id="app-titol">Paraula Ràpida</h1>
  <div id="nivell-actual">Nivell 1 - B1 | Progrés: 0/25</div>
  <select id="idioma-select">
    <option value="ca-es">Català → Espanyol</option>
    <option value="ca-en">Català → English</option>
    <option value="es-ca">Espanyol → Català</option>
    <option value="en-ca">English → Català</option>
  </select>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <span id="record">🏆 Rècord: 0</span>
  </div>
  <div class="stat-item" id="stats">
    Monedes: 0 | Rècord: 0
  </div>
</div>

<div class="container">

  <!-- Tab Mapa = Selector de 100 Nivells -->
  <div id="tab-mapa" class="tab-content active">
    <h2 style="margin-bottom: 20px;">🗺️ 100 Nivells</h2>
    <div id="mapa-nivells"></div>
  </div>

  <!-- Tab Missio = Joc: MECÀNICA 1 ARMA LA FRASE + MECÀNICA 2 TRADUEIX -->
  <div id="tab-missio" class="tab-content">
    <div id="minijoc-container">
      <h3 id="minijoc-titol">Nivell 1</h3>
      
      <!-- MECÀNICA 1: Arma la frase -->
      <div id="mec1-container">
        <p id="instruccio-mec1">Arma la frase correcta:</p>
        <div id="frase-objectiu"></div>
        <div id="frase-construida"></div>
        <div id="grid-emojis"></div>
        <button class="btn-encert" onclick="comprovarFrase()">Comprovar</button>
        <div id="minijoc-feedback"></div>
      </div>

      <!-- MECÀNICA 2: Tradueix -->
      <div id="mec2-container" style="display:none">
        <p id="instruccio-mec2">Tradueix la frase:</p>
        <div id="frase-a-traduir"></div>
        <input type="text" id="input-traduccio" placeholder="Escriu la traducció...">
        <button class="btn-encert" onclick="comprovarTraduccio()">Comprovar</button>
        <button class="btn-secundari" onclick="saltarMec2()">Saltar</button>
        <div id="feedback-mec2"></div>
      </div>

      <button class="btn-nova" onclick="novaFrase()">Nova frase</button>
    </div>
  </div>

  <!-- Tab Gremi = Biblioteca: Diccionari + Mini-joc + Tips + Lectura -->
  <div id="tab-gremi" class="tab-content">
    <div class="sub-tabs">
      <button class="sub-tab-btn active" onclick="mostrarTab('diccionari', event)">📖 Diccionari</button>
      <button class="sub-tab-btn" onclick="mostrarTab('minijocs', event)">🎮 Mini-joc</button>
      <button class="sub-tab-btn" onclick="mostrarTab('tips', event)">💡 Tips</button>
      <button class="sub-tab-btn" onclick="mostrarTab('lectura', event)">📚 Lectura</button>
    </div>
    <div id="gremi-contenidor"></div>
  </div>

  <!-- Tab Botiga -->
  <div id="tab-botiga" class="tab-content">
    <div id="botiga-contenidor"></div>
  </div>

</nav>

<script>
// Registrar Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrat:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>

<!-- ORDRE CRÍTIC: dades abans que lògica -->
<script src="./emoji-data.js"></script>
<script src="./frases-data.js"></script>
<script src="./tips-data.js"></script>
<script src="./botiga-data.js"></script>
<script src="./main.js"></script>

</body>
</html>
