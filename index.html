<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Paraula Ràpida</title>
<meta name="description" content="Joc per aprendre català B1-B3 en 100 nivells">
<meta name="theme-color" content="#8B0000">

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Iconos -->
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">

<link rel="stylesheet" href="./styles.css">
</head>
<body>

<header>
  <h1 id="app-titol">Paraula Ràpida</h1>
  <div id="nivell-actual" style="font-size: 12px; margin-top: 4px;">Nivell 1 - B1</div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <span id="record">🏆 Rècord: 0</span>
  </div>
  <div class="stat-item" id="stats">
    Encerts: 0 | Fallades: 0
  </div>
</div>

<div class="container">

  <!-- Tab Mapa = Selector de Nivells -->
  <div id="tab-mapa" class="tab-content active">
    <h2 style="margin-bottom: 20px;">🗺️ 100 Nivells</h2>
    <div id="mapa-nivells"></div>
  </div>

  <!-- Tab Missio = Joc -->
  <div id="tab-missio" class="tab-content">
    <div id="minijoc-container">
      <h3 id="minijoc-titol">Nivell 1</h3>
      <div id="timer">60</div>
      <div id="carta-actual"></div>
      <div id="minijoc-botons">
        <button class="btn-pass" onclick="passarCarta()">Pass</button>
        <button class="btn-encert" onclick="encertarCarta()">Sé</button>
      </div>
      <div id="minijoc-feedback"></div>
    </div>
  </div>

  <!-- Tab Gremi = Biblioteca + Tips -->
  <div id="tab-gremi" class="tab-content">
    <div class="sub-tabs">
      <button class="sub-tab-btn active" onclick="mostrarTab('diccionari', event)">📖 Diccionari</button>
      <button class="sub-tab-btn" onclick="mostrarTab('minijocs', event)">🎮 Mini-joc</button>
      <button class="sub-tab-btn" onclick="mostrarTab('tips', event)">💡 Tips</button>
    </div>
    <div id="gremi-contenidor"></div>
  </div>

</div>

<nav class="bottom-nav">
  <div class="nav-item active" onclick="canviarTab('mapa', event)">
    <span class="nav-icon">🗺️</span>
    <span>Nivells</span>
  </div>
  <div class="nav-item" onclick="canviarTab('missio', event); carregarCartaNivell(window.nivellActual || 1)">
    <span class="nav-icon">🎯</span>
    <span>Jugar</span>
  </div>
  <div class="nav-item" onclick="canviarTab('gremi', event)">
    <span class="nav-icon">📚</span>
    <span>Biblioteca</span>
  </div>
</nav>

<script>
function vibrar() {
  if (navigator.vibrate) navigator.vibrate(20);
}

// Registrar Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrat:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
</script>

<!-- ORDEN IMPORTANTE: datos antes que lógica -->
<script src="./emoji-data.js"></script>
<script src="./main.js"></script>

<!-- Inicializar joc -->
<script>
document.addEventListener('DOMContentLoaded', () => {
  window.nivellActual = 1;
  carregarCartaNivell(1);
});
</script>

</body>
</html>
